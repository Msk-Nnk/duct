<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- iPhone Safari用 (Webクリップアイコン) -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">

    <!-- Android Chrome用 (ホーム画面ショートカット/PWAアイコン) -->
    <link rel="icon" href="android-chrome-192.png" sizes="192x192" type="image/png">
    
    <!-- 共通ファビコン（オプション） -->
    <link rel="icon" href="favicon.png" sizes="any">

    <title>ダクト振れ管計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">ダクト振れ管計算機</h1>
        </div>

        <div class="p-6 space-y-6">
            <!-- Angle & Diameter Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">エルボ角度</label>
                    <div class="relative">
                        <select id="angleType" onchange="calculate()" class="w-full appearance-none bg-slate-50 border-2 border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all font-medium text-slate-800 cursor-pointer text-sm">
                            <option value="45-45">45° - 45°</option>
                            <option value="45-90">45° - 90°</option>
                            <option value="90-90">90° - 90°</option>
                        </select>
                        <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
                            ▼
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">ダクト径 (Φ)</label>
                    <div class="relative">
                        <select id="diameter" onchange="calculate()" class="w-full appearance-none bg-slate-50 border-2 border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all font-medium text-slate-800 cursor-pointer text-sm">
                            <!-- JS will generate 75-350 with 25 steps -->
                        </select>
                        <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
                            ▼
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Fields -->
            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">縦フレ寸法 (mm)</label>
                    <input type="number" id="vert" oninput="calculate()" placeholder="入力してください" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold text-slate-800 transition-all placeholder-slate-300">
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">横フレ寸法 (mm)</label>
                    <input type="number" id="horiz" oninput="calculate()" placeholder="入力してください" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold text-slate-800 transition-all placeholder-slate-300">
                </div>
            </div>

            <!-- Results Section -->
            <div id="result-container" class="bg-blue-50 rounded-2xl p-6 border border-blue-100 shadow-inner mt-4 space-y-4">
                
                <!-- Main Result: Pipe Length -->
                <div class="text-center pb-4 border-b border-blue-200">
                    <p class="text-sm font-bold text-blue-600 mb-1 tracking-wider">カットする単管長さ</p>
                    <div class="flex items-baseline justify-center text-blue-700">
                        <span id="res-pipe" class="text-7xl font-black transition-all"></span>
                        <span id="unit-pipe" class="text-2xl font-bold ml-2 hidden">mm</span>
                    </div>
                </div>

                <!-- Detail Results: Offset Only -->
                <div class="text-center border-b border-blue-200 pb-4">
                    <p class="text-[10px] font-bold text-blue-400 uppercase tracking-tighter">合成振れ</p>
                    <p class="text-lg font-bold text-slate-700"><span id="res-h"></span> <span id="unit-h" class="text-xs text-slate-500 hidden">mm</span></p>
                </div>

                <!-- Horizontal Distance Results -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center">
                        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">水平距離(ヒモ-ヒモ)</p>
                        <p class="text-md font-bold text-slate-700 leading-tight"><span id="res-himo-himo"></span> <span id="unit-himo1" class="text-xs text-slate-400 font-normal hidden">mm</span></p>
                    </div>
                    <div class="text-center border-l border-blue-200">
                        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">水平距離(ヒモ-芯)</p>
                        <p class="text-md font-bold text-slate-700 leading-tight"><span id="res-himo-shin"></span> <span id="unit-himo2" class="text-xs text-slate-400 font-normal hidden">mm</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Generate Diameter Options: 75 to 350 (25 step)
        const selectDiam = document.getElementById('diameter');
        for (let d = 75; d <= 350; d += 25) {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = d;
            if (d === 150) opt.selected = true;
            selectDiam.appendChild(opt);
        }

        function calculate() {
            const angleType = document.getElementById('angleType').value;
            const diameter = parseFloat(document.getElementById('diameter').value);
            const vVal = document.getElementById('vert').value;
            const hVal = document.getElementById('horiz').value;
            
            const resPipe = document.getElementById('res-pipe');
            const resH = document.getElementById('res-h');
            const resHimoHimo = document.getElementById('res-himo-himo');
            const resHimoShin = document.getElementById('res-himo-shin');

            const units = ['unit-pipe', 'unit-h', 'unit-himo1', 'unit-himo2'];

            // 入力がない場合はブランクにする
            if (vVal === "" && hVal === "") {
                resPipe.innerText = "";
                resH.innerText = "";
                resHimoHimo.innerText = "";
                resHimoShin.innerText = "";
                units.forEach(id => document.getElementById(id).classList.add('hidden'));
                return;
            }

            // 単位を表示
            units.forEach(id => document.getElementById(id).classList.remove('hidden'));

            const vert = parseFloat(vVal) || 0;
            const horiz = parseFloat(hVal) || 0;

            // 1. 合成振れ
            const H = Math.sqrt(Math.pow(vert, 2) + Math.pow(horiz, 2));

            // 2. 芯々距離 (計算には必要)
            let effectiveAngle = 45; 
            if (angleType === "90-90") effectiveAngle = 90;
            const rad = effectiveAngle * (Math.PI / 180);
            let L = (effectiveAngle === 90) ? H : H / Math.sin(rad);

            // 3. 芯先寸法
            const tan225 = Math.tan(22.5 * Math.PI / 180);
            const getShinsaki = (angle) => (angle === 90) ? diameter : diameter * tan225;

            let s1 = 0, s2 = 0;
            if (angleType === "45-45") {
                s1 = s2 = getShinsaki(45);
            } else if (angleType === "45-90") {
                s1 = getShinsaki(45);
                s2 = getShinsaki(90);
            } else if (angleType === "90-90") {
                s1 = s2 = getShinsaki(90);
            }

            // 4. 単管長さ
            let pipeLength = Math.floor(L - (s1 + s2));
            if (isNaN(pipeLength)) pipeLength = 0;

            // 5. 水平距離の算出
            let h_himo_himo = "-";
            let h_himo_shin = 0;

            if (angleType === "90-90") {
                h_himo_himo = Math.floor(s1 + s2);
                h_himo_shin = Math.floor(s1);
            } else if (angleType === "45-45") {
                h_himo_himo = Math.floor(H + s1 + s2);
                h_himo_shin = Math.floor(H + s1);
            } else if (angleType === "45-90") {
                h_himo_himo = "-";
                h_himo_shin = Math.floor(H + s1);
                document.getElementById('unit-himo1').classList.add('hidden');
            }

            // UI Update
            resH.innerText = H.toFixed(1);
            resHimoHimo.innerText = h_himo_himo;
            resHimoShin.innerText = h_himo_shin;
            resPipe.innerText = pipeLength;

            // 文字色でアラートを表現
            const pipeContainer = resPipe.parentElement;
            if (pipeLength <= 0) {
                pipeContainer.classList.add('text-red-500');
                pipeContainer.classList.remove('text-blue-700');
            } else {
                pipeContainer.classList.add('text-blue-700');
                pipeContainer.classList.remove('text-red-500');
            }
            
            let deferredPrompt;

            // Android Chrome: 自動プロンプトイベントを捕捉
            window.addEventListener('beforeinstallprompt', (e) => {
              e.preventDefault();
              deferredPrompt = e;
              showPrompt(); // バナー表示
            });
            
            // 共通: 初回訪問時や条件でバナー表示
            function showPrompt() {
              if (deferredPrompt) {
                // カスタムバナーHTML（例）
                const banner = document.createElement('div');
                banner.innerHTML = `
                  <div style="position:fixed;bottom:0;left:0;right:0;background:#007AFF;color:white;padding:15px;text-align:center;z-index:10000;">
                    <p>アプリのようにホーム画面に追加しませんか？</p>
                    <button onclick="addToHomeScreen()">追加する</button>
                    <button onclick="closeBanner()">閉じる</button>
                  </div>`;
                document.body.appendChild(banner);
              } else {
                // Safari: 手順ガイド
                alert('Safari: 共有ボタン → ホーム画面に追加 をタップ！');
              }
            }
            
            function addToHomeScreen() {
              if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choice) => {
                  if (choice.outcome === 'accepted') console.log('追加されました');
                  deferredPrompt = null;
                });
              }
              closeBanner();
            }
            
            function closeBanner() {
              const banner = document.querySelector('div[style*="position:fixed"]');
              if (banner) banner.remove();
            }
            
            // ページロード時にチェック（初回のみ）
            window.addEventListener('load', () => {
              if (!localStorage.getItem('pwa-prompt-shown')) {
                setTimeout(showPrompt, 3000); // 3秒後表示
                localStorage.setItem('pwa-prompt-shown', 'true');
              }
            });
        }
    </script>
</body>
</html>
